name: SimpleCrates
version: 1.0
main: local.simplecrates.SimpleCratesPlugin
api-version: 1.20
author: YourName
description: Custom crates system with 6 tiers
depend: [Vault]
softdepend: [SimpleKits, SimpleEconomy]
commands:
  crate:
    description: Crate management command
    usage: /crate <give|open> [player] [type]
    aliases: [crates]
  rankvoucher:
    description: Give rank vouchers
    usage: /rankvoucher give <player> <rank> [amount]
